name: CreateSheet_build_test

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'Frends.GoogleSheets.CreateSheet/**'
  workflow_dispatch:

jobs:
  build:
    uses: FrendsPlatform/FrendsTasks/.github/workflows/linux_build_test.yml@main
    with:
      workdir: Frends.GoogleSheets.CreateSheet
      dotnet_version: 8.0.x
      strict_analyzers: true
      env_var_name_1: GOOGLE_SERVICE_ACCOUNT_JSON_BASE64
      env_var_name_2: GOOGLE_SHEET_ID
    secrets:
      badge_service_api_key: ${{ secrets.BADGE_SERVICE_API_KEY }}
      test_feed_api_key: ${{ secrets.TASKS_TEST_FEED_API_KEY }}
      env_var_value_1: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
      env_var_value_2: ${{ secrets.GOOGLE_SHEET_ID }}
